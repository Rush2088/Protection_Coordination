<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>⚡ Protection Coordination Tool</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; }
    body { font-family: 'Segoe UI', Arial, sans-serif; }
    input[type=number]::-webkit-inner-spin-button { opacity: 0.5; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

    /* Portrait-mode blocker for small screens */
    #rotate-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: #0f172a;
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; color: #e2e8f0; text-align: center; padding: 32px;
    }
    #rotate-overlay svg { animation: spin 2s linear infinite; }
    @keyframes spin {
      0%   { transform: rotate(0deg); }
      40%  { transform: rotate(90deg); }
      100% { transform: rotate(90deg); }
    }
    @media (orientation: portrait) and (max-width: 900px) {
      #rotate-overlay { display: flex; }
      #root { display: none; }
    }
  </style>
</head>
<body>
  <div id="rotate-overlay">
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="2" width="16" height="20" rx="2"/>
      <path d="M9 22h6"/>
    </svg>
    <div style="font-size:18px;font-weight:700;color:#f1f5f9">Please rotate your device</div>
    <div style="font-size:13px;color:#94a3b8;max-width:260px">
      This tool is designed for <strong style="color:#60a5fa">landscape orientation</strong>.<br/>
      Rotate your phone or tablet to continue.
    </div>
  </div>
